version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_EXPIRE=${REDIS_CACHE_EXPIRE:-43200}
      - REDIS_CACHE_THRESHOLD=${REDIS_CACHE_THRESHOLD:-0.92}
      - DATABASE_URL=mysql+pymysql://root:rootpass@mysql:3306/medical_db
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=medical_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpass
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=medical_qa
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - OPENAI_API_KEY=${LLM_API_KEY}
      - OPENAI_API_BASE=${LLM_BASE_URL}
      - OPENAI_MODEL=${LLM_MODEL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_PROVIDER=${RERANK_PROVIDER:-custom}
      - RERANK_BASE_URL=${RERANK_BASE_URL}
      - RERANK_API_KEY=${RERANK_API_KEY}
      - RERANK_MODEL=${RERANK_MODEL}
      - KB_TOP_K=5
      - KB_SIMILARITY_THRESHOLD=${KB_SIMILARITY_THRESHOLD:-0.2}
      - KB_CHUNK_SIZE=512
      - KB_CHUNK_OVERLAP=80
      - MAX_ITERATIONS=${MAX_ITERATIONS:-10}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-300}
      - TIKTOKEN_CACHE_DIR=/app/data/tiktoken_cache
    volumes:
      - ./medagent:/app/medagent
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./evaluation:/app/evaluation
      - ./.env:/app/.env
    depends_on:
      - neo4j
      - redis
      - milvus
      - mysql
    networks:
      - medagent-network
    restart: unless-stopped
    command: uvicorn medagent.main:application --host 0.0.0.0 --port 8000 --reload

  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - medagent_neo4j_data:/data
      - medagent_neo4j_logs:/logs
    networks:
      - medagent-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=medical_db
    volumes:
      - medagent_mysql_data:/var/lib/mysql
      - ./data/init_mysql.sql:/docker-entrypoint-initdb.d/00_init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - medagent-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - medagent_redis_data:/data
    networks:
      - medagent-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - medagent_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - medagent-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - medagent_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - medagent-network

  milvus:
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - medagent_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - medagent-network

networks:
  medagent-network:
    driver: bridge

volumes:
  medagent_redis_data:
  medagent_etcd_data:
  medagent_minio_data:
  medagent_milvus_data:
  medagent_neo4j_data:
  medagent_neo4j_logs:
  medagent_mysql_data:
